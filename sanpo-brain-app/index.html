<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩脳 | 2画面ダッシュボード</title>
    <style>
        /* アニメーション */
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes flyToRight {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(300px, -100px) scale(0); opacity: 0; }
        }

        body {
            background-color: #0a192f;
            color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh; /* 画面全体を使う */
            overflow: hidden;
        }

        /* --- 左右分割レイアウト --- */
        .left-panel {
            flex: 1.2; /* 左側（入力と地図）を少し広く */
            padding: 30px;
            overflow-y: auto;
            border-right: 2px solid rgba(0, 212, 255, 0.2);
            background: rgba(16, 30, 56, 0.5);
        }

        .right-panel {
            flex: 0.8; /* 右側（履歴） */
            padding: 30px;
            overflow-y: auto;
            background: rgba(10, 25, 47, 0.8);
        }

        /* 地図エリア */
        #map-area {
            width: 100%;
            height: 250px;
            background: #112240;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #00d4ff;
            overflow: hidden;
            position: relative;
        }
        #map-img {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s;
        }

        /* 入力エリア */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        h2 {
            margin-top: 0;
            color: #00d4ff;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input, textarea {
            width: 100%; margin-bottom: 15px; padding: 12px; box-sizing: border-box;
            border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 10px; background: rgba(0,0,0,0.3);
            color: #fff; font-size: 16px;
        }

        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #28a745, #34ce57); color: white;
            border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: 900;
        }

        /* パーティクル演出 */
        .data-particle {
            position: absolute; width: 8px; height: 8px; background: #00d4ff; border-radius: 50%;
            pointer-events: none; z-index: 9999; box-shadow: 0 0 10px #00d4ff;
            animation: flyToRight 0.8s ease-in forwards;
        }

        /* カード（右側） */
        .log-card {
            margin-bottom: 20px; border-radius: 15px; overflow: hidden;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(0, 212, 255, 0.1);
            animation: slideIn 0.4s ease-out;
        }
        .card-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #0a192f; }
        .card-body { padding: 15px; font-size: 14px; }
        .card-footer { padding: 8px 15px; background: rgba(0,0,0,0.2); font-size: 11px; display: flex; justify-content: space-between; }
        
        .delete-btn { color: #ff4d4d; cursor: pointer; }
    </style>
</head>

<body>
    <div class="left-panel">
        <h2>🐾 散歩脳ダッシュボード</h2>
        
        <div id="map-area">
            <img id="map-img" src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=800&q=80" alt="map">
            <div style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; border: 1px solid #00d4ff;">
                📡 POSITION: <span id="current-pos">STANDBY</span>
            </div>
        </div>

        <div class="input-section" id="inputSection">
            <input type="text" id="place" placeholder="観測地点（場所）を入力..." onchange="updateMap(this.value)">
            <textarea id="memo" placeholder="解析ログ（思考内容）..." rows="3"></textarea>
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 13px; color: #00d4ff;">🧠 幸福度: <span id="happyNum">50</span>%</label>
                <input type="range" id="happiness" min="1" max="100" value="50" oninput="document.getElementById('happyNum').innerText=this.value" style="width: 100%;">
            </div>

            <button onclick="addLog()" id="recordBtn">脳内データを同期</button>
        </div>
    </div>

    <div class="right-panel">
        <h3 style="color: #00d4ff; border-bottom: 1px solid #00d4ff; padding-bottom: 10px;">🗄️ ARCHIVE</h3>
        <div id="list"></div>
    </div>

    <script>
        window.onload = function() {
            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.forEach(log => displayLog(log));
        };

        // 場所が入力されたら地図画像を変える（擬似演出）
        function updateMap(place) {
            document.getElementById('current-pos').innerText = place.toUpperCase();
            // 場所名に応じて画像検索っぽく画像を変える（ダミー）
            document.getElementById('map-img').src = `https://source.unsplash.com/featured/?city,${place},night`;
        }

        function addLog() {
            const p = document.getElementById('place').value;
            const m = document.getElementById('memo').value;
            const h = document.getElementById("happiness").value;

            if (!p) return alert("場所を入力してください");

            // 演出：右へ飛んでいく光
            createParticles();

            const newLog = {
                id: Date.now(), place: p, memo: m, happy: h,
                time: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString() 
            };

            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.push(newLog);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));

            setTimeout(() => {
                displayLog(newLog);
            }, 800);

            // リセット
            document.getElementById('place').value = "";
            document.getElementById('memo').value = "";
        }

        function displayLog(log) {
            const color = log.happy >= 80 ? "#fff176" : log.happy >= 50 ? "#a5d6a7" : "#cbd5e0";
            const card = document.createElement('div');
            card.className = 'log-card';
            card.id = `log-${log.id}`;
            card.innerHTML = `
                <div class="card-header" style="background-color: ${color}">
                    <span>📍 ${log.place}</span>
                    <span>Score: ${log.happy}%</span>
