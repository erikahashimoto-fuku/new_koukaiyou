<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩脳 | 履歴アーカイブ</title>
    <style>
        /* アニメーション */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        body {
            background-color: #f4f7f9;
            color: #2c3e50;
            font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            max-width: 440px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0, 123, 255, 0.1);
            border: 1px solid #d1d9e0;
        }

        h2 {
            text-align: center;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: #ffffff !important;
            padding: 15px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 900;
            margin-top: 0;
        }

        #brain-advisor {
            background: #f8fbff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border: 1px solid #007bff;
        }

        #char-icon {
            font-size: 40px;
            margin-right: 15px;
            animation: float 2s infinite;
        }

        #ai-message {
            font-size: 13px;
            font-weight: bold;
            color: #34495e;
            line-height: 1.4;
        }

        /* 入力エリア */
        .tag-container {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .status-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid #cbd5e0;
            background: #fff;
            cursor: pointer;
        }

        .status-tag.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        input,
        textarea,
        select {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }

        /* 記録ボタンをシンプルに */
        button {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* 管理パネル */
        .admin-panel {
            margin-top: 25px;
            padding: 15px;
            background: #eef2f7;
            border-radius: 12px;
            border: 1px solid #d1d9e0;
        }

        .admin-title {
            font-size: 12px;
            font-weight: bold;
            color: #5a67d8;
            margin-bottom: 10px;
            display: block;
        }

        /* カードデザイン */
        .log-card {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            border: 1px solid #e2e8f0;
            animation: slideUp 0.4s ease-out;
        }

        .card-header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .vital-gauge-bg {
            width: 80px;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .vital-gauge-fill {
            height: 100%;
            background: #2c3e50;
        }

        .card-body {
            padding: 18px 20px;
            background-color: #ffffff;
            background-image: linear-gradient(#f0f4f8 1px, transparent 1px), linear-gradient(90deg, #f0f4f8 1px, transparent 1px);
            background-size: 15px 15px;
            font-size: 14px;
        }

        .card-footer {
            padding: 10px 20px;
            background: #f8fafc;
            border-top: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }

        .share-btn {
            background: #007bff;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .delete-btn {
            color: #e53e3e;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🐾 散歩脳</h2>

        <div id="brain-advisor">
            <div id="char-icon">🤖</div>
            <div id="ai-message">全データの同期が完了。君の歩みはすべてここに記録されているよ。</div>
        </div>

        <input type="text" id="place" placeholder="どこを歩いた？">

        <div class="tag-container">
            <span class="status-tag" onclick="this.classList.toggle('active')">#集中</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#リラックス</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#アイデア</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#脳内バグ</span>
        </div>

        <textarea id="memo" placeholder="思考内容を記録..." rows="3"></textarea>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px;">🧠 幸福度: <span
                    id="happyNum">50</span>%</label>
            <input type="range" id="happiness" min="1" max="100" value="50"
                oninput="document.getElementById('happyNum').innerText=this.value" style="width: 100%;">
        </div>

        <button onclick="addLog()">記録</button>

        <div class="admin-panel">
            <span class="admin-title">🔍 履歴を探す</span>
            <input type="text" id="searchInput" onkeyup="filterLogs()" placeholder="キーワードで検索..."
                style="margin-bottom: 10px; padding: 8px;">
            <select id="monthFilter" onchange="filterLogs()" style="padding: 8px;">
                <option value="">すべての月</option>
                <option value="/1/">1月</option>
                <option value="/2/">2月</option>
                <option value="/3/">3月</option>
                <option value="/4/">4月</option>
                <option value="/5/">5月</option>
                <option value="/6/">6月</option>
                <option value="/7/">7月</option>
                <option value="/8/">8月</option>
                <option value="/9/">9月</option>
                <option value="/10/">10月</option>
                <option value="/11/">11月</option>
                <option value="/12/">12月</option>
            </select>
        </div>

        <div id="list"></div>
    </div>

    <script>
        // 読み込み時にデータを復元
        window.onload = function () {
            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.forEach(log => displayLog(log));
        };

        // 記録ボタンのメイン機能
        function addLog() {
            const p = document.getElementById('place').value;
            const m = document.getElementById('memo').value;
            const h = document.getElementById("happiness").value;
            const tags = Array.from(document.querySelectorAll('.status-tag.active')).map(t => t.innerText).join(' ');

            if (!p) return alert("場所を入力してください");

            const newLog = {
                id: Date.now(),
                place: p,
                memo: m,
                happy: h,
                tags: tags,
                time: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString()
            };

            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.push(newLog);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));

            displayLog(newLog);

            // リセット
            document.getElementById('place').value = "";
            document.getElementById('memo').value = "";
            document.querySelectorAll('.status-tag').forEach(t => t.classList.remove('active'));
        }

        // 画面にカードを表示する関数
        function displayLog(log) {
            const color = log.happy >= 80 ? "#fff176" : log.happy >= 50 ? "#a5d6a7" : "#cbd5e0";
            const card = document.createElement('div');
            card.className = 'log-card';
            card.id = `log-${log.id}`;
            card.innerHTML = `
                <div class="card-header" style="background-color: ${color}">
                    <span>📍 ${log.place}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div class="vital-gauge-bg"><div class="vital-gauge-fill" style="width:${log.happy}%"></div></div>
                        <span>${log.happy}%</span>
                    </div>
                </div>
                <div class="card-body">
                    <div style="color:#007bff; font-size:10px; margin-bottom:5px; font-weight:bold;">${log.tags}</div>
                    <p style="margin:0;">${log.memo || "..."}</p>
                </div>
                <div class="card-footer">
                    <span>${log.time}</span>
                    <div>
                        <span class="share-btn" onclick="share('${log.place}', ${log.happy})">共有</span>
                        <span class="delete-btn" onclick="deleteLog(${log.id})">🗑️</span>
                    </div>
                </div>
            `;
            document.getElementById('list').prepend(card);
        }

        // 検索・フィルタ機能
        function filterLogs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const monthTerm = document.getElementById('monthFilter').value;
            const cards = document.getElementsByClassName('log-card');

            Array.from(cards).forEach(card => {
                const text = card.innerText.toLowerCase();
                const dateText = card.querySelector('.card-footer span').innerText;
                const matchesSearch = text.includes(searchTerm);
                const matchesMonth = monthTerm === "" || dateText.includes(monthTerm);
                card.style.display = (matchesSearch && matchesMonth) ? "block" : "none";
            });
        }

        // 削除機能
        function deleteLog(id) {
            if (!confirm("削除しますか？")) return;
            let savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs = savedLogs.filter(log => log.id !== id);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));
            document.getElementById(`log-${id}`).remove();
        }

        function share(p, h) {
            alert(`地点:${p} 幸福度:${h}% のデータをコピーしました。`);
        }
    </script>
</body>

</html>
