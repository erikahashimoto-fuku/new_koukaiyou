<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩脳 | アーカイブダッシュボード</title>
    <style>
        /* アニメーション */
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        /* 右方向へ飛んでいく演出 */
        @keyframes flyToRight {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(400px, -50px) scale(0); opacity: 0; }
        }

        body {
            background-color: #f4f7f9;
            color: #2c3e50;
            font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden; /* 全体はスクロールさせない */
        }

        /* --- 左右分割レイアウト --- */
        .left-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            border-right: 1px solid #d1d9e0;
            background: #ffffff;
        }

        .right-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: #f8fafc;
        }

        h2, h3 { color: #007bff; margin-top: 0; }

        /* 入力エリア（元のデザインを維持） */
        .input-group { margin-bottom: 20px; }
        input, textarea {
            width: 100%; margin-bottom: 15px; padding: 12px; border: 1.5px solid #e2e8f0;
            border-radius: 10px; font-size: 16px; box-sizing: border-box;
        }

        .tag-container { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .status-tag {
            padding: 5px 12px; border-radius: 20px; font-size: 11px;
            border: 1px solid #cbd5e0; background: #fff; cursor: pointer;
        }
        .status-tag.active { background: #007bff; color: white; border-color: #007bff; }

        button {
            width: 100%; padding: 16px; background: #28a745; color: white;
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        /* 履歴カード（元のデザインベース） */
        .log-card {
            margin-bottom: 20px; border-radius: 15px; overflow: hidden;
            background: white; border: 1px solid #e2e8f0; animation: slideIn 0.4s ease-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px; }
        .vital-gauge-bg { width: 60px; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; }
        .vital-gauge-fill { height: 100%; background: #000; }
        .card-body { padding: 15px; font-size: 14px; line-height: 1.5; border-top: 1px solid #f0f0f0; }
        .card-footer { padding: 10px 15px; background: #f8fafc; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 11px; }
        
        .delete-btn { color: #e53e3e; cursor: pointer; font-size: 14px; }

        /* 飛んでいく光の粒 */
        .particle {
            position: fixed; width: 10px; height: 10px; background: #007bff; border-radius: 50%;
            pointer-events: none; z-index: 9999; box-shadow: 0 0 10px #007bff;
            animation: flyToRight 0.8s ease-in forwards;
        }
    </style>
</head>

<body>
    <div class="left-panel">
        <h2>🐾 散歩脳</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 30px;">散歩データとメンタルデータを可視化します</p>

        <div class="input-group">
            <input type="text" id="place" placeholder="どこを歩いた？">
            <div class="tag-container">
                <span class="status-tag" onclick="this.classList.toggle('active')">#集中</span>
                <span class="status-tag" onclick="this.classList.toggle('active')">#リラックス</span>
                <span class="status-tag" onclick="this.classList.toggle('active')">#アイデア</span>
                <span class="status-tag" onclick="this.classList.toggle('active')">#脳内バグ</span>
            </div>
            <textarea id="memo" placeholder="思考内容を記録..." rows="4"></textarea>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px;">🧠 幸福度: <span id="happyNum">50</span>%</label>
                <input type="range" id="happiness" min="1" max="100" value="50" oninput="document.getElementById('happyNum').innerText=this.value" style="width: 100%;">
            </div>

            <button onclick="addLog()" id="recordBtn">記録</button>
        </div>
    </div>

    <div class="right-panel">
        <h3>🗄️ アーカイブ履歴</h3>
        <div id="list"></div>
    </div>

    <script>
        // 読み込み時にデータを復元
        window.onload = function() {
            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.forEach(log => displayLog(log));
        };

        function addLog() {
            const p = document.getElementById('place').value;
            const m = document.getElementById('memo').value;
            const h = document.getElementById("happiness").value;
            const tags = Array.from(document.querySelectorAll('.status-tag.active')).map(t => t.innerText).join(' ');

            if (!p) return alert("場所を入力してください");

            // 演出：右側のパネルへ飛んでいく光
            createParticles();

            const newLog = {
                id: Date.now(),
                place: p,
                memo: m,
                happy: h,
                tags: tags,
                time: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString() 
            };

            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.push(newLog);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));

            // 演出に合わせて少し遅れて表示
            setTimeout(() => {
                displayLog(newLog);
            }, 800);

            // リセット
            document.getElementById('place').value = "";
            document.getElementById('memo').value = "";
            document.querySelectorAll('.status-tag').forEach(t => t.classList.remove('active'));
        }

        function displayLog(log) {
            const color = log.happy >= 80 ? "#fff176" : log.happy >= 50 ? "#a5d6a7" : "#cbd5e0";
            const card = document.createElement('div');
            card.className = 'log-card';
            card.id = `log-${log.id}`;
            card.innerHTML = `
                <div class="card-header" style="background-color: ${color}">
                    <span>📍 ${log.place}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div class="vital-gauge-bg"><div class="vital-gauge-fill" style="width:${log.happy}%"></div></div>
                        <span>${log.happy}%</span>
                    </div>
                </div>
                <div class="card-body">
                    <div style="color:#007bff; font-size:10px; margin-bottom:5px; font-weight:bold;">${log.tags}</div>
                    <p style="margin:0;">${log.memo || "..."}</p>
                </div>
                <div class="card-footer">
                    <span>${log.time}</span>
                    <span class="delete-btn" onclick="deleteLog(${log.id})">🗑️ 削除</span>
                </div>
            `;
            document.getElementById('list').prepend(card);
        }

        // パーティクル（飛んでいく光）の生成
        function createParticles() {
            const btn = document.getElementById('recordBtn');
            const rect = btn.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (rect.left + rect.width / 2) + "px";
                p.style.top = rect.top + "px";
                p.style.animationDelay = (i * 0.1) + "s";
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function deleteLog(id) {
            if(!confirm("削除しますか？")) return;
            let savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs = savedLogs.filter(log => log.id !== id);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));
            document.getElementById(`log-${id}`).remove();
        }
    </script>
</body>
</html>
