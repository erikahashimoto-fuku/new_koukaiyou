<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>散歩脳 - 完全版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #eef3ff;
            --white: #ffffff;
            --text-color: #333333;
            --tag-joy: #FFD700;
            --tag-relax: #3CB371;
            --tag-concentration: #4169E1;
            --tag-fatigue: #9370DB;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            /* スマホで下までスクロールしやすく */
            padding-bottom: 40px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                padding: 20px;
            }
        }

        .panel {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            /* 16px以上にするとスマホでズームされない */
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            /* 指で押しやすく少し拡大 */
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: white;
            user-select: none;
        }

        .tag.active {
            color: var(--white);
            background-color: #5a7fee;
            border-color: #5a7fee;
        }

        .record-btn {
            background-color: #4CAF50;
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .record-btn:active {
            background-color: #388E3C;
        }

        .chart-container {
            height: 180px;
            position: relative;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .archive-item {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            padding: 8px 12px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        /* 削除ボタンのスタイル */
        .del-mark {
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
            opacity: 0.7;
        }

        .del-mark:hover {
            opacity: 1;
        }

        .card-body {
            padding: 12px;
        }

        .item-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .memo-content {
            font-size: 14px;
            white-space: pre-wrap;
        }

        .archive-item[data-style="joy"] .card-header {
            background-color: var(--tag-joy);
            color: #333;
        }

        .archive-item[data-style="relax"] .card-header {
            background-color: var(--tag-relax);
        }

        .archive-item[data-style="concentration"] .card-header {
            background-color: var(--tag-concentration);
        }

        .archive-item[data-style="fatigue"] .card-header {
            background-color: var(--tag-fatigue);
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transition: all 1.2s;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="panel">
            <div
                style="font-size: 18px; font-weight: bold; border-bottom: 2px solid #ddd; padding-bottom: 8px; margin-bottom: 15px;">
                🐾 散歩脳</div>
            <div class="form-group">
                <label>📍 場所</label>
                <input type="text" id="walkLocation" value="品川">
            </div>
            <div class="form-group">
                <label>🏷 気分</label>
                <div class="tag-group" id="tagGroup">
                    <span class="tag active" data-style="joy">#楽しい</span>
                    <span class="tag" data-style="relax">#リラックス</span>
                    <span class="tag" data-style="concentration">#悩み中・・・</span>
                    <span class="tag" data-style="fatigue">#わくわく！</span>
                </div>
            </div>
            <div class="form-group">
                <label>📝 メモ</label>
                <textarea id="memoText" placeholder="何を感じた？"></textarea>
            </div>
            <div class="form-group">
                <label>😊 幸福度: <span id="happinessValue">80%</span></label>
                <input type="range" id="happinessSlider" min="0" max="100" value="80">
            </div>
            <button class="record-btn" id="recordBtn">記録する</button>
            <button id="clearBtn"
                style="margin-top:20px; background:none; border:none; color:#ccc; font-size:10px; cursor:pointer;">データを全消去する</button>
        </div>

        <div class="panel">
            <div style="font-weight: bold; margin-bottom: 10px; font-size: 14px;">🧠 メンタル推移 (直近10件)</div>
            <div class="chart-container"><canvas id="mentalChart"></canvas></div>
        </div>

        <div class="panel">
            <div
                style="font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px; font-size: 14px;">
                📦 履歴アーカイブ</div>
            <div class="archive-list" id="archiveList"></div>
        </div>
    </div>

    <script>
        // 1. グローバル変数の初期化
        let records = JSON.parse(localStorage.getItem('sampo_records')) || [];
        let mentalChart;

        // 2. 演出用関数
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.backgroundColor = ['#FFD700', '#3CB371', '#4169E1', '#9370DB'][Math.floor(Math.random() * 4)];
            const size = Math.random() * 10 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.opacity = '0.6';
            document.body.appendChild(p);
            setTimeout(() => {
                p.style.transform = `translate(${(Math.random() - 0.5) * 150}px, ${(Math.random() - 0.5) * 150}px) scale(0)`;
                p.style.opacity = '0';
            }, 50);
            setTimeout(() => p.remove(), 1200);
        }
