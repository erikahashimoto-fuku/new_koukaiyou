<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩記録アプリ</title>
    <style>
        /* アニメーション */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes flashEffect {
            0% {
                background-color: #e3f2fd;
            }

            50% {
                background-color: #ffffff;
            }

            100% {
                background-color: #e3f2fd;
            }
        }

        body {
            background-color: #ffffff;
            /* 背景は真っ白 */
            color: #000000;
            /* 文字は真っ黒 */
            font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            padding: 20px;
        }

        .flash {
            animation: flashEffect 0.3s ease-out;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            max-width: 420px;
            margin: auto;
            /* 影も灰色ではなく、薄い青にして清潔感を出しました */
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.1);
            border: 1px solid #e3f2fd;
        }

        /* 散歩記録バナー：灰色を消して「鮮やかな青」にしました */
        h2 {
            text-align: center;
            background-color: #007bff;
            /* 鮮やかなブルー */
            color: #ffffff !important;
            /* 文字は白抜きでハッキリ */
            padding: 15px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        input,
        textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #007bff;
            /* 枠線も青に */
            border-radius: 15px;
            background: #ffffff;
            font-size: 16px;
            color: #000000;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        /* 記録ボタン：灰色を消して「鮮やかな緑」にしました */
        button {
            width: 100%;
            padding: 18px;
            background-color: #28a745;
            /* 鮮やかな成功のグリーン */
            color: #ffffff !important;
            /* 文字は白抜きで太く */
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        .log {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            color: #000000 !important;
            font-weight: bold;
            animation: slideIn 0.5s ease-out;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🐾 散歩記録</h2>

        <body>
            <div class="container">
                <h2>🐾 散歩記録</h2>

                <div id="brain-advisor"
                    style="background: #f0f7ff; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #007bff; display: flex; align-items: center; position: relative;">
                    <div style="font-size: 40px; margin-right: 15px;" id="char-icon">🤖</div>
                    <div>
                        <div id="badge-area"
                            style="font-size: 10px; font-weight: bold; color: #28a745; margin-bottom: 5px;">【散歩ビギナー】
                        </div>
                        <div id="ai-message" style="font-size: 14px; font-weight: bold; color: #333;">
                            「スキャン準備完了！今日の君の脳内を教えてくれ！」</div>
                    </div>
                </div>
                <input type="text" id="place" placeholder="どこを歩いた？">
                ...

                <input type="text" id="place" placeholder="どこを歩いた？">
                <textarea id="memo" placeholder="感想など"></textarea>

                <div style="margin-top: 15px; margin-bottom: 15px;">
                    <label for="happiness"
                        style="display: block; margin-bottom: 8px; font-weight: bold; color: #007bff;">
                        😊 今日の幸福度: <span id="happyNum">50</span>%
                    </label>
                    <input type="range" id="happiness" min="1" max="100" value="50" oninput="updateHappyNum(this.value)"
                        style="width: 100%;">
                </div>

                <button onclick="addLog()">記録を保存する</button>

                <div id="list"></div>
            </div>

            <script>
                function updateHappyNum(val) {
                    document.getElementById("happyNum").innerText = val;
                }

                window.onload = function () {
                    const savedPlace = localStorage.getItem("LastPlace");
                    if (savedPlace) {
                        const div = document.createElement("div");
                        div.className = "log";
                        div.style.backgroundColor = "#e3f2fd";
                        div.style.border = "2px solid #007bff";
                        div.innerHTML = "<strong>(前回の脳内記録)</strong><br> 📍 " + savedPlace;
                        document.getElementById("list").prepend(div);
                    }
                };

                function addLog() {
                    const p = document.getElementById('place').value;
                    const m = document.getElementById('memo').value;
                    const h = document.getElementById("happiness").value;

                    if (!p) return alert("場所を入力してください");

                    document.body.classList.add("flash");
                    setTimeout(() => document.body.classList.remove("flash"), 300);

                    localStorage.setItem("LastPlace", p);

                    let color = "";
                    if (h >= 80) color = "#fff176"; // 鮮やかな黄
                    else if (h >= 50) color = "#a5d6a7"; // 鮮やかな緑
                    else color = "#eeeeee"; // 落ち着いた白に近いグレー

                    const div = document.createElement('div');
                    div.className = 'log';
                    div.style.backgroundColor = color;
                    div.style.color = "#000000";

                    div.innerHTML = `
                <strong>${new Date().toLocaleString()}</strong><br>
                📍 ${p} (幸福度: ${h}%)
                <p style="margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 5px;">${m}</p>
            `;

                    document.getElementById('list').prepend(div);

                    document.getElementById('place').value = "";
                    document.getElementById('memo').value = "";
                    document.getElementById('happiness').value = 50;
                    document.getElementById('happyNum').innerText = 50;
                }
            </script>
        </body>

</html>
