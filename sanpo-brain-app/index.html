<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩脳 | 科学館フライト演出</title>
    <style>
        /* アニメーション */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* データが飛んでいく時の光の粒（パーティクル） */
        @keyframes flyToArchive {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            80% {
                transform: translate(var(--tx), var(--ty)) scale(0.5);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        body {
            background-color: #0a192f;
            /* 近未来的なダークブルー（Findyロゴと相性◎） */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            overflow-x: hidden;
            /* はみ出し防止 */
        }

        .container {
            background: rgba(16, 30, 56, 0.9);
            /* 透過させて、背景の光を透けさせる */
            backdrop-filter: blur(10px);
            /* すりガラス効果 */
            padding: 30px;
            border-radius: 24px;
            max-width: 440px;
            margin: auto;
            box-shadow: 0 20px 50px rgba(0, 212, 255, 0.2);
            /* 青いネオン・グロウ */
            border: 1px solid rgba(0, 212, 255, 0.3);
            position: relative;
            /* パーティクルの基準点 */
        }

        h2 {
            text-align: center;
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: #ffffff !important;
            padding: 15px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 900;
            margin-top: 0;
            text-shadow: 0 2px 10px rgba(0, 212, 255, 0.5);
        }

        /* AIアドバイザー（ネオン・グロウ） */
        #brain-advisor {
            background: rgba(0, 212, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        #char-icon {
            font-size: 40px;
            margin-right: 15px;
            animation: float 2s infinite;
        }

        #ai-message {
            font-size: 14px;
            font-weight: bold;
            color: #ccf6ff;
            line-height: 1.4;
        }

        /* 入力エリア（ダークモード対応） */
        .tag-container {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .status-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid rgba(0, 212, 255, 0.5);
            background: transparent;
            color: #00d4ff;
            cursor: pointer;
            transition: 0.2s;
        }

        .status-tag.active {
            background: #00d4ff;
            color: #0a192f;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        input,
        textarea,
        select {
            width: 100%;
            margin-bottom: 15px;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            font-size: 16px;
            color: #ffffff;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* 記録ボタン（ネオン・グリーン） */
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #28a745, #34ce57);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 900;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        button:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.5);
        }

        /* --- 飛んでいく光の粒（パーティクル） --- */
        .data-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00d4ff;
            border-radius: 50%;
            pointer-events: none;
            /* クリック無効 */
            z-index: 9999;
            box-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
            /* 強烈な光 */
            animation: flyToArchive var(--dur) ease-in-out forwards;
        }

        /* 履歴カード（グラスモルフィズム風） */
        .log-card {
            margin-top: 24px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(16, 30, 56, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            animation: slideIn 0.5s ease-out;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #0a192f;
        }

        .vital-gauge-bg {
            width: 80px;
            height: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .vital-gauge-fill {
            height: 100%;
            background: #0a192f;
            transition: 0.5s;
        }

        .card-body {
            padding: 18px 20px;
            background-image: linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
            background-size: 15px 15px;
            font-size: 14px;
            color: #ccf6ff;
        }

        .card-footer {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #888;
        }

        .share-btn {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .delete-btn {
            color: #e53e3e;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container" id="appContainer">
        <h2>🐾 散歩脳</h2>

        <div id="brain-advisor">
            <div id="char-icon">🤖</div>
            <div id="ai-message">全データの同期が完了。君の歩みはすべてここに記録されているよ。</div>
        </div>

        <input type="text" id="place" placeholder="どこを歩いた？">

        <div class="tag-container">
            <span class="status-tag" onclick="this.classList.toggle('active')">#集中</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#リラックス</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#アイデア</span>
            <span class="status-tag" onclick="this.classList.toggle('active')">#脳内バグ</span>
        </div>

        <textarea id="memo" placeholder="思考内容を記録..." rows="3"></textarea>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #00d4ff;">🧠
                幸福度: <span id="happyNum">50</span>%</label>
            <input type="range" id="happiness" min="1" max="100" value="50"
                oninput="document.getElementById('happyNum').innerText=this.value" style="width: 100%;">
        </div>

        <button onclick="addLog()" id="recordBtn">記録</button>

        <div id="list"></div>
    </div>

    <script>
        window.onload = function () {
            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.forEach(log => displayLog(log, false)); // 初回読み込み時はアニメーションなし
        };

        function addLog() {
            const p = document.getElementById('place').value;
            const m = document.getElementById('memo').value;
            const h = document.getElementById("happiness").value;
            const tags = Array.from(document.querySelectorAll('.status-tag.active')).map(t => t.innerText).join(' ');

            if (!p) return alert("場所を入力してください");

            // --- ★科学館風「データ・フライト」演出★ ---
            animateDataFlight();

            // データ保存
            const newLog = {
                id: Date.now(),
                place: p, memo: m, happy: h, tags: tags,
                time: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString()
            };
            const savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs.push(newLog);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));

            // 少し遅らせてカードを表示（飛んでいく時間を稼ぐ）
            setTimeout(() => {
                displayLog(newLog, true); // trueでスライドインアニメーションをオン

                // AIメッセージ更新
                let advice = h >= 80 ? "🤩 ニューロンの活性化を確認。素晴らしい。" : h >= 50 ? "😊 安定した波形です。継続してください。" : "🍀 負荷を検知。書き出しによるデバッグを推奨。";
                document.getElementById('ai-message').innerText = advice;
                document.getElementById('char-icon').innerText = h >= 80 ? "🤩" : h >= 50 ? "😊" : "🍀";
            }, 1000); // 1秒後に表示

            // リセット
            document.getElementById('place').value = "";
            document.getElementById('memo').value = "";
            document.querySelectorAll('.status-tag').forEach(t => t.classList.remove('active'));
        }

        // ログを表示する関数
        function displayLog(log, animate) {
            const color = log.happy >= 80 ? "#fff176" : log.happy >= 50 ? "#a5d6a7" : "#cbd5e0";
            const card = document.createElement('div');
            card.className = 'log-card';
            if (!animate) card.style.animation = "none"; // 初回読み込み時はアニメーションをオフ
            card.id = `log-${log.id}`;
            card.innerHTML = `
                <div class="card-header" style="background-color: ${color}">
                    <span>📍 ${log.place}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div class="vital-gauge-bg"><div class="vital-gauge-fill" style="width:${log.happy}%"></div></div>
                        <span>${log.happy}%</span>
                    </div>
                </div>
                <div class="card-body">
                    <div style="color:#00d4ff; font-size:10px; margin-bottom:5px; font-weight:bold;">${log.tags}</div>
                    <p style="margin:0;">${log.memo || "..."}</p>
                </div>
                <div class="card-footer">
                    <span>${log.time}</span>
                    <div>
                        <span class="share-btn" onclick="share('${log.place}', ${log.happy})">共有</span>
                        <span class="delete-btn" onclick="deleteLog(${log.id})">🗑️</span>
                    </div>
                </div>
            `;
            document.getElementById('list').prepend(card);
        }

        // --- ★データが飛んでいく演出を管理する関数★ ---
        function animateDataFlight() {
            const btn = document.getElementById('recordBtn');
            const list = document.getElementById('list');
            const container = document.getElementById('appContainer');

            // ボタンの位置と、リストの位置（飛んでいく目的地）を取得
            const btnRect = btn.getBoundingClientRect();
            const listRect = list.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();

            // 飛んでいく光の粒（パーティクル）を5つ作る
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'data-particle';

                // 初期位置（ボタンの中央付近）
                particle.style.left = (btnRect.left - containerRect.left) + (btnRect.width / 2) + "px";
                particle.style.top = (btnRect.top - containerRect.top) + (btnRect.height / 2) + "px";

                // 飛んでいく距離と方向（目的地のリストへ）
                const tx = (listRect.left - btnRect.left);
                const ty = (listRect.top - btnRect.top);

                // CSS変数を使ってアニメーションに反映
                particle.style.setProperty('--tx', tx + "px");
                particle.style.setProperty('--ty', ty + "px");
                particle.style.setProperty('--dur', (Math.random() * 0.5 + 0.8) + "s"); // 0.8〜1.3秒で飛ぶ

                // 少しずらして生成
                particle.style.animationDelay = (i * 0.1) + "s";

                container.appendChild(particle);

                // アニメーションが終わったら削除
                setTimeout(() => particle.remove(), 2000);
            }
        }

        function deleteLog(id) {
            if (!confirm("削除しますか？")) return;
            let savedLogs = JSON.parse(localStorage.getItem("MentalLogs") || "[]");
            savedLogs = savedLogs.filter(log => log.id !== id);
            localStorage.setItem("MentalLogs", JSON.stringify(savedLogs));
            document.getElementById(`log-${id}`).remove();
        }

        function share(p, h) {
            alert(`地点:${p} 幸福度:${h}% のデータをコピーしました。`);
        }
    </script>
</body>

</html>
