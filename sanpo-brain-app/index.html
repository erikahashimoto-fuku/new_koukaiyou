<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>散歩脳 - 決定版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #eef3ff;
            --white: #ffffff;
            --text-color: #333333;
            --tag-joy: #FFD700;
            --tag-relax: #3CB371;
            --tag-concentration: #4169E1;
            --tag-fatigue: #9370DB;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                padding: 20px;
            }
        }

        .panel {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            /* iOSのズーム防止 */
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            /* スマホ用に少し拡大 */
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            background: white;
            user-select: none;
        }

        .tag.active {
            color: var(--white);
            background-color: #5a7fee;
            border-color: #5a7fee;
        }

        .record-btn {
            background-color: #4CAF50;
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 18px;
            /* タップしやすく */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .record-btn:active {
            background-color: #388E3C;
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .archive-item {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            padding: 10px 12px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .delete-btn {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .card-body {
            padding: 12px;
        }

        .item-time {
            color: #888;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .memo-content {
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .archive-item[data-style="joy"] .card-header {
            background-color: var(--tag-joy);
            color: #333;
        }

        .archive-item[data-style="relax"] .card-header {
            background-color: var(--tag-relax);
        }

        .archive-item[data-style="concentration"] .card-header {
            background-color: var(--tag-concentration);
        }

        .archive-item[data-style="fatigue"] .card-header {
            background-color: var(--tag-fatigue);
        }

        .particle
