<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>散歩脳 | メンタルダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #eef3ff;
            --panel-bg: #ffffff;
            --joy: #FFD700;
            --relax: #3CB371;
            --concentration: #4169E1;
            --fatigue: #9370DB;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 2カラムレイアウト */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0;
            font-size: 22px;
        }

        /* 入力フォーム */
        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tag.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .slider-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
        }

        .record-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            float: right;
        }

        /* 履歴カード */
        .archive-list {
            margin-top: 10px;
        }

        .card {
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #eee;
            background: white;
        }

        .card-header {
            padding: 10px 15px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .card-body {
            padding: 15px;
        }

        /* 色分け */
        .joy .card-header {
            background: var(--joy);
        }

        .relax .card-header {
            background: var(--relax);
        }

        .concentration .card-header {
            background: var(--concentration);
        }

        .fatigue .card-header {
            background: var(--fatigue);
        }

        /* グラフエリア */
        .graph-panel {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
        }

        /* ぽわぽわパーティクル */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }

            20% {
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100vh) translateX(var(--x));
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="panel">
            <div class="header">
                <h2>🐾 散歩脳 🤖</h2>
                <span style="color: #007bff;">✨ AI アシスポット</span>
            </div>

            <div class="field">
                <label>どこを歩いた？</label>
                <input type="text" id="place" value="大崎">
            </div>

            <div class="tags">
                <div class="tag" onclick="selectTag(this, 'joy')">#Joy</div>
                <div class="tag active" onclick="selectTag(this, 'relax')">#Relax</div>
                <div class="tag" onclick="selectTag(this, 'concentration')">#Concentration</div>
                <div class="tag" onclick="selectTag(this, 'fatigue')">#Fatigue</div>
            </div>

            <div class="field">
                <label>思考内容を記録...</label>
                <textarea id="memo">
