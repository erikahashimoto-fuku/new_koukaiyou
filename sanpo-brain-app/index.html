<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>散歩脳 - リアルタイム記録版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #eef3ff;
            --white: #ffffff;
            --text-color: #333333;
            --tag-joy: #FFD700;
            --tag-relax: #3CB371;
            --tag-concentration: #4169E1;
            --tag-fatigue: #9370DB;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            position: relative;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background-color: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 10;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .tag.active {
            color: var(--white);
            background-color: #5a7fee;
            border-color: #5a7fee;
        }

        .record-btn {
            background-color: #4CAF50;
            color: var(--white);
            border: none;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
        }

        /* アーカイブのデザイン */
        .right-panel {
            overflow-y: auto;
            max-height: 85vh;
        }

        .archive-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .archive-item {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background-color: white;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            padding: 10px 15px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .card-body {
            padding: 15px;
        }

        .item-time {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        /* タグごとの色 */
        .archive-item.joy .card-header {
            background-color: var(--tag-joy);
            color: #333;
        }

        .archive-item.relax .card-header {
            background-color: var(--tag-relax);
        }

        .archive-item.concentration .card-header {
            background-color: var(--tag-concentration);
        }

        .archive-item.fatigue .card-header {
            background-color: var(--tag-fatigue);
        }

        /* ぽわぽわ（短縮版） */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            filter: blur(2px);
            transition: opacity 0.8s, transform 1.5s ease-out;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="left-panel">
            <div class="panel">
                <div class="app-header">
                    <div style="font-size: 20px; font-weight: bold;">🐾 散歩脳</div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>場所</label>
                    <input type="text" id="walkLocation" value="大崎">
                </div>

                <div class="form-group">
                    <label>気分</label>
                    <div class="tag-group">
                        <span class="tag active" data-type="楽しい">#Joy</span>
                        <span class="tag" data-type="リラックス">#Relax</span>
                        <span class="tag" data-type="悩み中・・・">#Concentration</span>
                        <span class="tag" data-type="わくわく！">#Fatigue</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>メモ</label>
                    <textarea id="memoText">いいアイデアが浮かんだ！</textarea>
                </div>

                <div class="form-group">
                    <label>幸福度</label>
                    <input type="range" id="happinessSlider" min="0" max="100" value="80">
                    <span id="happinessValue">80%</span>
                </div>

                <button class="record-btn" id="recordBtn">記録する</button>
            </div>

            <div class="panel">
                <div style="font-weight: bold; margin-bottom: 10px;">🧠 メンタル推移</div>
                <div style="height: 150px;"><canvas id="mentalChart"></canvas></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel">
                <div
                    style="font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px;">
                    📦 履歴アーカイブ</div>
                <div class="archive-list" id="archiveList">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- タグ切り替え ---
        const tags = document.querySelectorAll('.tag');
        tags.forEach(t => t.addEventListener('click', () => {
            tags.forEach(tag => tag.classList.remove('active'));
            t.classList.add('active');
        }));

        // --- スライダー連動 ---
        const slider = document.getElementById('happinessSlider');
        slider.addEventListener('input', () => {
            document.getElementById('happinessValue').textContent = slider.value + '%';
        });

        // --- グラフ ---
        const ctx = document.getElementById('mentalChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({ length: 10 }, (_, i) => i + 1),
                datasets: [{
                    data: [60, 75, 70, 85, 80, 90, 85, 95, 80, 85],
                    borderColor: '#4169E1',
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // --- ぽわぽわ演出（短縮） ---
        const createParticle = () => {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.backgroundColor = ['#FFD700', '#3CB371', '#4169E1', '#9370DB'][Math.floor(Math.random() * 4)];
            const size = Math.random() * 15 + 5 + 'px';
            p.style.width = size; p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            p.style.opacity = '0.7';
            document.body.appendChild(p);

            setTimeout(() => {
                p.style.transform = `translate(${(Math.random() - 0.5) * 200}px, ${(Math.random() - 0.5) * 200}px)`;
                p.style.opacity = '0';
            }, 50);
            setTimeout(() => p.remove(), 1500);
        };

        // --- 【重要】リアルタイム記録処理 ---
        document.getElementById('recordBtn').addEventListener('click', () => {
            // 1. データの取得
            const location = document.getElementById('walkLocation').value;
            const memo = document.getElementById('memoText').value;
            const happiness = document.getElementById('happinessSlider').value;
            const activeTag = document.querySelector('.tag.active');
            const tagType = activeTag.getAttribute('data-type');
            const tagName = activeTag.textContent;

            // 2. 現在時刻の作成
            const now = new Date();
            const timeString = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

            // 3. 追加するHTML要素の作成
            const list = document.getElementById('archiveList');
            const item = document.createElement('div');
            item.className = `archive-item ${tagType}`;
            item.innerHTML = `
                <div class="card-header">
                    <div>📍 ${location}</div>
                    <div>${happiness}%</div>
                </div>
                <div class="card-body">
                    <div class="item-time">🕒 ${timeString} ${tagName}</div>
                    <div class="memo-content">${memo}</div>
                </div>
            `;

            // 4. リストの先頭（一番上）に追加
            list.prepend(item);

            // 5. 演出
            for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 30);

            // 6. フィードバック
            const btn = document.getElementById('recordBtn');
            btn.textContent = '記録完了！';
            btn.style.backgroundColor = '#2196F3';
            setTimeout(() => {
                btn.textContent = '記録する';
                btn.style.backgroundColor = '#4CAF50';
            }, 1500);
        });
    </script>
</body>

</html>
